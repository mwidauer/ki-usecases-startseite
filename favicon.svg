<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <filter id="glow-cyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-purple" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-mint" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background: Deep Navy mit abgerundeten Ecken -->
  <rect width="32" height="32" rx="7" fill="#0a0f1e"/>
  <!-- Subtle inner border -->
  <rect width="32" height="32" rx="7" fill="none" stroke="#1e2a42" stroke-width="1"/>

  <!-- Verbindungslinien (hinter den Nodes) -->
  <!-- Links → Mitte -->
  <line x1="9"  y1="10" x2="16" y2="16" stroke="#00d4ff" stroke-width="0.9" opacity="0.45"/>
  <line x1="9"  y1="22" x2="16" y2="16" stroke="#00d4ff" stroke-width="0.9" opacity="0.45"/>
  <!-- Mitte → Rechts -->
  <line x1="16" y1="16" x2="23" y2="10" stroke="#10d9a0" stroke-width="0.9" opacity="0.45"/>
  <line x1="16" y1="16" x2="23" y2="22" stroke="#10d9a0" stroke-width="0.9" opacity="0.45"/>

  <!-- Nodes: Links (Cyan) -->
  <circle cx="9"  cy="10" r="2.8" fill="#00d4ff" filter="url(#glow-cyan)"/>
  <circle cx="9"  cy="22" r="2.8" fill="#00d4ff" filter="url(#glow-cyan)"/>

  <!-- Node: Mitte (Purple) -->
  <circle cx="16" cy="16" r="3.5" fill="#8b5cf6" filter="url(#glow-purple)"/>

  <!-- Nodes: Rechts (Mint) -->
  <circle cx="23" cy="10" r="2.8" fill="#10d9a0" filter="url(#glow-mint)"/>
  <circle cx="23" cy="22" r="2.8" fill="#10d9a0" filter="url(#glow-mint)"/>
</svg>
