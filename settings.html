<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Einstellungen – KI-Usecases</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header__title">KI-<span>Usecases</span> – Einstellungen</div>
    <a href="index.html" class="header__settings">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
      </svg>
      Zurück
    </a>
  </header>

  <!-- Settings Main -->
  <main class="settings-main">
    <h1>Anwendungsfälle & Tools</h1>
    <p class="subtitle">Anwendungsfälle hinzufügen, bearbeiten oder entfernen. Änderungen werden lokal gespeichert.</p>

    <div class="settings-actions">
      <button class="btn btn-primary" id="btnAdd">+ Anwendungsfall hinzufügen</button>
      <button class="btn btn-secondary" id="btnExport">↓ Exportieren</button>
      <label class="btn btn-secondary" style="cursor:pointer">
        ↑ Importieren
        <input type="file" id="importFile" accept=".json" style="display:none" />
      </label>
      <button class="btn btn-secondary" id="btnReset">Auf Standard zurücksetzen</button>
    </div>

    <div class="usecase-list" id="usecaseList"></div>
  </main>

  <!-- Edit Drawer -->
  <div class="drawer-overlay" id="drawerOverlay">
    <div class="drawer" id="drawer">
      <div class="drawer__header">
        <div class="drawer__title" id="drawerTitle">Anwendungsfall bearbeiten</div>
        <button class="modal__close" id="drawerClose">✕</button>
      </div>

      <form id="editForm" novalidate>
        <input type="hidden" id="editId" />

        <div class="form-group">
          <label class="form-label" for="editName">Name</label>
          <input class="form-input" id="editName" type="text" placeholder="z. B. Recherche" required />
        </div>

        <div class="form-group">
          <label class="form-label" for="editDescription">Beschreibung</label>
          <textarea class="form-textarea" id="editDescription" rows="3" placeholder="Kurze Beschreibung des Anwendungsfalls"></textarea>
        </div>

        <div class="form-group">
          <label class="form-label" for="editIcon">Icon-Pfad (relativ, z. B. icons/icon_01.png)</label>
          <input class="form-input" id="editIcon" type="text" placeholder="icons/icon_01.png" />
        </div>

        <div class="form-group">
          <label class="form-label">Tools</label>
          <div id="toolsContainer"></div>
          <button type="button" class="btn btn-secondary" id="btnAddTool" style="margin-top:0.5rem;font-size:0.8rem;padding:0.4rem 0.85rem">
            + Tool hinzufügen
          </button>
        </div>

        <div style="display:flex;gap:0.75rem;margin-top:1.5rem">
          <button type="submit" class="btn btn-primary" style="flex:1">Speichern</button>
          <button type="button" class="btn btn-secondary" id="drawerCancelBtn">Abbrechen</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="launchers/local-apps.js"></script>
  <script src="settings.js"></script>
</body>
</html>
